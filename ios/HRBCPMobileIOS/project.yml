name: HRBCPMobileIOS
options:
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: id.co.bcpgroup.hrbcp.mobile
    PRODUCT_NAME: HR-BCP Mobile
    SWIFT_VERSION: 5.0
    IPHONEOS_DEPLOYMENT_TARGET: 13.0
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Resources/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""
packages: {}
targets:
  HRBCPMobileIOS:
    type: application
    platform: iOS
    sources:
      - path: App
    resources:
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: id.co.bcpgroup.hrbcp.mobile
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0.0
    scheme:
      gatherCoverageData: false
      testTargets: []
